# Alembic configuration for StockNew. The DSN comes from
# src.db.session.get_dsn() at runtime (env.py reads it), so the
# sqlalchemy.url value below is just a placeholder.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use a single timestamp-based file naming scheme so revisions sort
# chronologically on disk. The 4-digit prefix is set manually for
# clarity (0001_initial.py, 0002_...).
file_template = %%(rev)s_%%(slug)s

sqlalchemy.url = driver://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
