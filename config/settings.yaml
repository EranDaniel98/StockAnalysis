# =============================================================================
# Stock Market Scanner - Global Settings
# All parameters are configurable - NOTHING is hardcoded in the code
# =============================================================================

data:
  source: "yfinance"
  history_years: 5
  interval: "1d"                    # 1m, 5m, 15m, 30m, 1h, 1d, 1wk, 1mo
  cache_expiry_hours: 24              # cache expiry when market is CLOSED
  market_hours_cache_minutes: 5      # cache expiry when market is OPEN (prices change!)
  max_concurrent_downloads: 10
  request_delay_seconds: 0.5        # delay between API calls to avoid rate limits

markets:
  exchanges:
    - "NYSE"
    - "NASDAQ"
  min_market_cap: 1_000_000_000     # $1B minimum
  min_avg_volume: 500_000
  max_price: null                   # no upper limit
  min_price: 5.0                    # filter penny stocks
  exclude_otc: true

screening:
  stage1_max_stocks: 500            # max stocks after initial filter
  stage2_max_stocks: 50             # max stocks for deep analysis
  discovery_method: "finviz"        # finviz, local_csv, watchlist
  local_csv_path: null              # path to custom ticker list (one ticker per line)
  sort_stage1_by: "volume"          # volume, market_cap, change

sectors_focus:
  - "Technology"
  - "Semiconductors"
  - "Communication Services"

keywords_focus:
  - "artificial intelligence"
  - "machine learning"
  - "semiconductor"
  - "cloud computing"
  - "data center"
  - "GPU"

# --- Technical Indicator Parameters ---
technical_indicators:
  sma_periods:
    - 20
    - 50
    - 200
  ema_periods:
    - 9
    - 12
    - 26
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
  bollinger:
    period: 20
    std_dev: 2.0
  atr:
    period: 14
  volume:
    avg_period: 20
    spike_multiplier: 2.0
  stochastic:
    k_period: 14
    d_period: 3
    overbought: 80
    oversold: 20

# --- Fundamental Analysis Thresholds ---
fundamental_filters:
  max_pe_ratio: 50
  min_pe_ratio: 0
  max_peg_ratio: 3.0
  min_revenue_growth_pct: 10
  max_debt_to_equity: 2.0
  min_roe_pct: 10
  min_current_ratio: 1.0
  min_profit_margin_pct: 5
  min_free_cash_flow: 0

# --- Scoring Thresholds ---
scoring:
  thresholds:
    strong_buy: 80
    buy: 65
    hold_upper: 50
    hold_lower: 35
    sell: 20
    # below sell threshold = STRONG SELL

# --- Risk Management ---
risk_management:
  position_sizing:
    method: "fixed_fractional"      # fixed_fractional, kelly
    max_portfolio_pct: 10           # max % of portfolio in one position
    max_sector_pct: 30              # max % of portfolio in one sector
    default_portfolio_value: 100000
  stop_loss:
    method: "atr"                   # atr, percentage, support
    atr_multiplier: 2.0
    percentage: 5.0
  take_profit:
    # resistance: pick the nearest chart-derived resistance level that
    # gives at least `min_risk_reward_ratio` payoff relative to the
    # stop. If no level qualifies (recent breakout, low-volatility
    # range, etc.) we fall back to a flat `risk_reward_ratio` multiple
    # so the field is never empty. The basis used for each ticker is
    # reported in risk_management.take_profit.method on the API
    # response — "resistance" when a chart level was picked,
    # "risk_reward" when the fallback fired.
    method: "resistance"            # risk_reward, atr, resistance
    risk_reward_ratio: 3.0          # fallback when no usable resistance
    min_risk_reward_ratio: 1.5      # reject resistances tighter than this
    atr_multiplier: 4.0
  # Gate entries on the broader-market regime. SPY vs SMA + VIX bands.
  # mode: off | skip_bear | skip_bear_and_chop
  #   - off:                  do not gate (legacy behavior)
  #   - skip_bear:            block entries when SPY<SMA AND VIX>vix_high
  #   - skip_bear_and_chop:   only enter in clean bull (SPY>SMA AND VIX<vix_low)
  # 'unknown' (data missing) always allows entry — don't punish outages.
  # A/B sweep on 2026-05-12 (data/sweep_regime.json) found the gate net-
  # negative OOS in the 2023-05 → 2026-05 window (no real bear regime to
  # protect against). Default disabled. Re-enable when SPY meaningfully
  # breaks SMA200 with VIX > 25 sustained, or before paper-trading
  # through a known macro event.
  regime_filter:
    enabled: false
    mode: "off"
    sma_period: 200
    vix_low: 20.0
    vix_high: 25.0
  # Score valuation metrics (P/E, PEG, P/B, EV/EBITDA) on percentile
  # within the ticker's sector cohort instead of absolute thresholds.
  # A sector cohort of fewer than `min_cohort` tickers falls back to
  # absolute scoring for that sector. Enable A/B-tested via
  # scripts/sweep_sector_relative.py.
  sector_relative_scoring:
    enabled: true
    min_cohort: 5
  # Analyst recommendationKey is reactive (upgrades follow price moves)
  # and structurally inflated (sell-side ~50% buy ratings, ~5% sell), so
  # the analyst sub-score mostly shifts the whole composite up without
  # discriminating. A/B sweep on 2026-05-12 (data/sweep_analyst_score.json)
  # found the toggle effectively neutral on swing_trading (-0.02 OOS
  # Sharpe, +1.7pp OOS return, identical risk metrics) — but the saved
  # weight slot lets fundamentals-heavy strategies (value_investing,
  # long_term_growth, dividend_income) avoid the lagged-signal drag.
  # Disabled by default; flip back to true if you want legacy behavior.
  analyst_score:
    enabled: false
  # RSI and Stochastic both measure 14-period overbought/oversold with
  # similar bullish/bearish signal cadence. When merged, technical.analyze
  # averages their scores into one composite entry and emits ONE signal
  # only when both agree — cutting the double-count in both the
  # technical sub-score AND the engine's signal-consensus adjustment.
  # A/B-test via scripts/sweep_oscillator_merge.py.
  momentum_oscillator:
    merge_rsi_stoch: false

# --- Alerts ---
alerts:
  telegram:
    enabled: true
    min_score_to_notify: 75
    cooldown_minutes: 60
    daily_summary: false
    daily_summary_time: "18:00"

# --- Display ---
display:
  top_n_results: 20
  show_detailed_analysis: true
  color_output: true
  table_style: "rounded"           # rounded, simple, grid

# --- Logging ---
logging:
  level: "INFO"                    # DEBUG, INFO, WARNING, ERROR
  file: null                       # null = stdout only, or path to log file
