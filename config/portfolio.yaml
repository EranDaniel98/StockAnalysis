# Position action thresholds (configurable)
# These control when the system recommends ADD / HOLD / TRIM / SELL for existing positions
action_thresholds:
  add_score: 65                      # score >= this AND position underweight -> ADD
  hold_min_score: 40                 # score >= this -> HOLD
  trim_score: 35                     # score < hold but >= this AND overweight -> TRIM
  # below trim_score -> SELL

  # When to consider a position "overweight" (% of portfolio)
  overweight_pct: 15
  # When to consider a position "underweight" (% of portfolio)
  underweight_pct: 3
