# StockNew local infrastructure: Postgres 16 + Redis 7.
#
# Runs only on localhost. Named volumes (not bind mounts) avoid Docker
# Desktop on Windows permission issues with C:\Users\... paths.
#
# Usage:
#   docker compose up -d         # start
#   docker compose ps            # status
#   docker compose down          # stop, preserve volumes
#   docker compose down -v       # stop and DELETE all data
#
# Health checks gate Alembic so migrations don't run before the DB is ready.

services:
  postgres:
    image: postgres:16-alpine
    container_name: stocknew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stocknew
      POSTGRES_PASSWORD: stocknew_dev
      POSTGRES_DB: stocknew
      # Tuning for laptop dev — keep it light
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocknew -d stocknew"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: stocknew-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1000", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
